<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Painel de Auditoria de Leituras</title>
        <link rel="stylesheet" href="css/style.css">
        <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    </head>
    <body>
        <!-- LOADER -->
        <div id="loader">
            <img src="assets/logo.png" class="logoLoader">
            <p>Analisando relatório...</p>
        </div>

        <header>
            <h1>Painel de Auditoria de Leituras</h1>
        </header>
        
        <section class="upload">
            <div id="dropZone">
                <p>Arraste o Excel aqui ou clique para enviar</p>
                <input type="file" id="excelFile">
            </div>
        </section>
        
        <!-- DASHBOARD -->
        
        <section class="dashboard">
            <div class="card">
                <h3>Total Leituras</h3>
                <p id="totalLeituras">0</p>
            </div>
            <div class="card verde">
                <h3>Sem Ocorrência</h3>
                <p id="semOcorrencia">0</p>
            </div>
            <div class="card vermelho">
                <h3>Ocorrência sem Foto</h3>
                <p id="semFoto">0</p>
            </div>
            <div class="card laranja">
                <h3>Ocorrência com Foto</h3>
                <p id="comFoto">0</p>
            </div>
        </section>

        <!-- GRÁFICO -->

        <section class="grafico">
            <canvas id="graficoOcorrencias"></canvas>
        </section>

        <!-- FILTROS -->

        <section class="filtros">
            <input type="text" id="filtroMatricula" placeholder="Filtrar matrícula">
            <select id="filtroOcorrencia">
                <option value="">Todas ocorrências</option>
            </select>
        </section>

        <!-- TABELA -->

        <section>
            <table id="tabela">
                <thead>
                    <tr>
                        <th>Matrícula</th>
                        <th>Leitura</th>
                        <th>Ocorrência</th>
                        <th>Foto</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </section>

        <!-- GALERIA DE FOTOS -->

        <section class="galeria">
            <h2>Fotos de Ocorrências</h2>
            <div id="galeriaFotos"></div>
        </section>
        
        <div id="modal">
            <img id="fotoModal">
        </div>
        <script src="js/script.js"></script>
    </body>
</html>
