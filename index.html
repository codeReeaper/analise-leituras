<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel de Auditoria de Leituras</title>

<!-- fonte brutal -->
<link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">

<!-- biblioteca excel -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<!-- gráfico -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- mapa -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

</head>

<body>

<!-- LOADER -->

<div id="loader">

<img src="assets/logo.png" class="logoLoader">

<p class="loaderText">PROCESSANDO RELATÓRIO</p>

<div class="progressBar">

<div id="progressFill"></div>

</div>

<p id="progressText">0%</p>

</div>

<header>

<h1>Painel de Auditoria de Leituras</h1>

</header>

<section class="upload">

<input type="file" id="excelFile">

</section>

<section class="dashboard">

<div class="card">
<h3>Total</h3>
<p id="totalLeituras">0</p>
</div>

<div class="card verde">
<h3>Sem Ocorrência</h3>
<p id="semOcorrencia">0</p>
</div>

<div class="card vermelho">
<h3>Sem Foto</h3>
<p id="semFoto">0</p>
</div>

<div class="card laranja">
<h3>Com Foto</h3>
<p id="comFoto">0</p>
</div>

</section>

<section>

<h2>Mapa das Leituras</h2>

<div id="mapa"></div>

</section>

<section>

<table id="tabela">

<thead>

<tr>
<th>Matrícula</th>
<th>Leitura</th>
<th>Ocorrência</th>
<th>Colaborador</th>
<th>Foto</th>
</tr>

</thead>

<tbody></tbody>

</table>

</section>

<section>

<h2>Fotos de Ocorrência</h2>

<div id="galeriaFotos"></div>

</section>

<div id="modal">

<img id="fotoModal">

</div>

<script src="js/script.js"></script>

</body>
</html>
